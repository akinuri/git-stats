<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Git Stats</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="./utils.js"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
					},
					colors: {
						ink: {
							50: '#f8fafc',
							100: '#f1f5f9',
							200: '#e2e8f0',
							300: '#cbd5e1',
							400: '#94a3b8',
							500: '#64748b',
							600: '#475569',
							700: '#334155',
							800: '#1e293b',
							900: '#0f172a',
						},
					},
				},
			},
		};
	</script>
</head>

<body class="min-h-screen bg-slate-100/50 pb-24 font-sans text-base text-slate-900 antialiased sm:pb-32">
	<main class="flex h-full w-full flex-col px-4 py-6 pb-24 sm:px-6 sm:pb-32 lg:px-8">
		<header class="space-y-3">
			<h1 class="text-3xl">Git Stats</h1>
		</header>

		<section class="mt-6 space-y-4">
			<div class="space-y-2">
				<label class="block text-base" for="dumpFile">Upload dump file</label>
				<input id="dumpFile" type="file" accept=".txt,.log,.dump,text/plain" class="block w-full rounded border border-slate-400 bg-white px-3 py-2 text-base">
			</div>

			<div class="space-y-2">
				<label class="block text-base" for="dumpInput">Paste dump text</label>
				<textarea id="dumpInput" rows="5" spellcheck="false" placeholder="@@COMMIT@@ ..." class="block w-full rounded border border-slate-400 bg-white px-3 py-2 font-mono text-base"></textarea>
			</div>

			<div class="flex flex-wrap gap-2">
				<button id="parseButton" class="rounded border border-slate-800 bg-slate-800 px-4 py-2 text-base text-white hover:bg-slate-700">Parse dump</button>
				<button id="clearButton" class="rounded border border-slate-400 bg-white px-4 py-2 text-base hover:bg-slate-200">Clear</button>
			</div>
		</section>

		<section class="mt-6 rounded bg-white shadow">
			<div id="tableWrap" class="overflow-auto rounded border border-slate-200">
				<table class="min-w-full divide-y divide-slate-200 text-left text-base">
					<thead class="sticky top-0 z-10 bg-slate-200/75 text-slate-800 backdrop-blur-sm">
						<tr>
							<th class="px-4 py-3">#</th>
							<th class="px-4 py-3">Hash</th>
							<th class="px-4 py-3">Parents</th>
							<th class="px-4 py-3">Author</th>
							<th class="px-4 py-3">Author date</th>
							<th class="px-4 py-3">Committer</th>
							<th class="px-4 py-3">Committer date</th>
							<th class="px-4 py-3">Subject</th>
							<th class="px-4 py-3">Body</th>
							<th class="px-4 py-3">Changes</th>
							<th class="px-4 py-3">Files</th>
						</tr>
					</thead>
					<tbody id="commitTableBody" class="divide-y divide-slate-100 bg-white"></tbody>
				</table>
			</div>
			<div id="emptyState" class="py-10 text-base text-slate-700 pl-2">Paste a dump or upload a file to render the commit table.</div>
		</section>

		<section class="mt-6 rounded bg-white p-4 shadow sm:p-5">
			<div class="flex items-center justify-between gap-3">
				<h2 class="text-lg text-slate-900">Daily Contributions</h2>
				<div id="contributionSummary" class="text-sm text-slate-600"></div>
			</div>
			<div id="contributionGraphEmpty" class="mt-4 text-slate-700">Parse a dump to see daily activity.</div>
			<div id="contributionGraphWrap" class="mt-4 hidden">
				<div class="overflow-x-auto">
					<div class="min-w-max pb-1">
						<div class="grid grid-cols-[auto_1fr] grid-rows-[auto_auto] gap-x-2">
							<div></div>
							<div id="contributionMonths" class="mb-1 h-4 grid gap-2 pl-0.5 text-[11px] text-slate-500"></div>
							<div class="grid grid-rows-8 auto-rows-[0.75rem] gap-1 text-[11px] leading-3 text-slate-500">
								<div class="flex h-3 items-center">Mon</div>
								<div class="flex h-3 items-center">Tue</div>
								<div class="flex h-3 items-center">Wed</div>
								<div class="flex h-3 items-center">Thu</div>
								<div class="flex h-3 items-center">Fri</div>
								<div class="flex h-3 items-center">Sat</div>
								<div class="flex h-3 items-center">Sun</div>
								<div class="text-[10px] text-slate-400"></div>
							</div>
							<div id="contributionGrid" class="grid grid-rows-8 grid-flow-col auto-cols-max auto-rows-[0.75rem] gap-x-2 gap-y-0"></div>
						</div>
					</div>
				</div>
			</div>
		</section>
	</main>

	<script>
		const dumpFile = document.getElementById('dumpFile');
		const dumpInput = document.getElementById('dumpInput');
		const parseButton = document.getElementById('parseButton');
		const clearButton = document.getElementById('clearButton');
		const tableWrap = document.getElementById('tableWrap');
		const commitTableBody = document.getElementById('commitTableBody');
		const emptyState = document.getElementById('emptyState');
		const contributionSummary = document.getElementById('contributionSummary');
		const contributionGraphEmpty = document.getElementById('contributionGraphEmpty');
		const contributionGraphWrap = document.getElementById('contributionGraphWrap');
		const contributionMonths = document.getElementById('contributionMonths');
		const contributionGrid = document.getElementById('contributionGrid');
		const parser = globalThis.GitStatsUtils || {};
		const {
			parseGitDump: parseGitDumpUtil,
			escapeHtml: escapeHtmlUtil,
			shortHash: shortHashUtil,
		} = parser;

		let commits = [];

		function setTableHeight(hasRows) {
			tableWrap.style.height = hasRows ? '65vh' : 'auto';
		}

		function renderFiles(files) {
			if (!files.length) {
				return '<span class="text-slate-900">No file changes</span>';
			}

			return `
				<div class="space-y-2 text-base">
					${files.map((file) => `
						<div class="whitespace-nowrap">
							<span class="text-slate-900">${escapeHtmlUtil(file.path || '')}</span>
							<span class="ml-2 text-emerald-600">+${file.insertions ?? '∅'}</span>
							<span class="text-slate-900"> / </span>
							<span class="text-rose-600">-${file.deletions ?? '∅'}</span>
						</div>
					`).join('')}
				</div>
			`;
		}

		function renderRows(data) {
			if (!data.length) {
				commitTableBody.innerHTML = '';
				setTableHeight(false);
				emptyState.classList.remove('hidden');
				return;
			}

			const rows = data.map((commit, index) => {
				const rowNumber = data.length - index;
				const shortParents = commit.parents.map((parent) => shortHashUtil(parent)).join(' ');
				const summaryInsertions = commit.files.reduce((sum, file) => sum + (file.insertions || 0), 0);
				const summaryDeletions = commit.files.reduce((sum, file) => sum + (file.deletions || 0), 0);
				const sameAuthorAndCommitterDate = commit.author_date === commit.committer_date;

				return `
					<tr class="align-top hover:bg-slate-50">
						<td class="whitespace-nowrap px-4 py-2 text-slate-900">${rowNumber}</td>
						<td class="whitespace-nowrap px-4 py-2 font-mono text-base text-slate-900" title="${escapeHtmlUtil(commit.hash || '')}">${escapeHtmlUtil(shortHashUtil(commit.hash))}</td>
						<td class="whitespace-nowrap px-4 py-2 font-mono text-base text-slate-900" title="${escapeHtmlUtil(commit.parents.join(' '))}">${shortParents ? escapeHtmlUtil(shortParents) : '<span class="text-slate-900">-</span>'}</td>
						<td class="px-4 py-2 text-slate-900">
							<div class="font-semibold text-slate-900">${escapeHtmlUtil(commit.author_name || '')}</div>
							<div class="text-base text-slate-500">${escapeHtmlUtil(commit.author_email || '')}</div>
						</td>
						<td class="whitespace-nowrap px-4 py-2 font-mono text-base text-slate-900">${escapeHtmlUtil(commit.author_date || '')}</td>
						<td class="px-4 py-2 text-slate-900">
							<div class="font-semibold text-slate-900">${escapeHtmlUtil(commit.committer_name || '')}</div>
							<div class="text-base text-slate-500">${escapeHtmlUtil(commit.committer_email || '')}</div>
						</td>
						<td class="whitespace-nowrap px-4 py-2 font-mono text-base ${sameAuthorAndCommitterDate ? 'text-slate-300' : 'text-slate-900'}">${escapeHtmlUtil(commit.committer_date || '')}</td>
						<td class="px-4 py-2 text-slate-900">
							<div class="max-w-md whitespace-normal text-slate-900">${escapeHtmlUtil(commit.subject || '')}</div>
						</td>
						<td class="px-4 py-2 text-slate-900">
							<pre class="max-w-lg whitespace-pre-wrap break-words text-base leading-6 text-slate-700">${commit.body ? escapeHtmlUtil(commit.body) : '<span class="text-slate-300">(empty)</span>'}</pre>
						</td>
						<td class="px-4 py-2 text-slate-900">
							<div class="text-slate-900 whitespace-nowrap">
								<span>${commit.files.length} file${commit.files.length === 1 ? '' : 's'}</span>
								<span class="ml-2 text-emerald-600">+${summaryInsertions}</span>
								<span class="text-slate-900"> / </span>
								<span class="text-rose-600">-${summaryDeletions}</span>
							</div>
						</td>
						<td class="px-4 py-2 text-slate-900">
							${renderFiles(commit.files)}
						</td>
					</tr>
				`;
			}).join('');

			commitTableBody.innerHTML = rows;
			setTableHeight(true);
			emptyState.classList.add('hidden');
		}

		function toDayKey(dateText) {
			const text = String(dateText || '').trim();
			const isoDayMatch = text.match(/\d{4}-\d{2}-\d{2}/);

			if (isoDayMatch) {
				return isoDayMatch[0];
			}

			const parsed = new Date(text);
			if (Number.isNaN(parsed.getTime())) {
				return '';
			}

			const year = parsed.getUTCFullYear();
			const month = String(parsed.getUTCMonth() + 1).padStart(2, '0');
			const day = String(parsed.getUTCDate()).padStart(2, '0');
			return `${year}-${month}-${day}`;
		}

		function parseDayKey(dayKey) {
			const date = new Date(`${dayKey}T00:00:00Z`);
			return Number.isNaN(date.getTime()) ? null : date;
		}

		function formatDayLabel(dayKey) {
			const date = parseDayKey(dayKey);
			if (!date) {
				return dayKey;
			}

			return date.toLocaleDateString(undefined, {
				year: 'numeric',
				month: 'short',
				day: 'numeric',
				weekday: 'short',
			});
		}

		function startOfWeek(date) {
			const copy = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
			const day = copy.getUTCDay();
			const mondayOffset = (day + 6) % 7;
			copy.setUTCDate(copy.getUTCDate() - mondayOffset);
			return copy;
		}

		function levelClass(count, maxCount) {
			if (!count) {
				return 'bg-slate-100 border-slate-200';
			}

			if (maxCount <= 1) {
				return 'bg-emerald-300 border-emerald-300';
			}

			const ratio = count / maxCount;
			if (ratio <= 0.25) {
				return 'bg-emerald-100 border-emerald-200';
			}
			if (ratio <= 0.5) {
				return 'bg-emerald-300 border-emerald-300';
			}
			if (ratio <= 0.75) {
				return 'bg-emerald-500 border-emerald-500';
			}

			return 'bg-emerald-700 border-emerald-700';
		}

		function renderContributionGraph(data) {
			const dayCounts = new Map();
			for (const commit of data) {
				const dayKey = toDayKey(commit.author_date || commit.committer_date);
				if (!dayKey) {
					continue;
				}

				dayCounts.set(dayKey, (dayCounts.get(dayKey) || 0) + 1);
			}

			if (!dayCounts.size) {
				contributionSummary.textContent = '';
				contributionMonths.innerHTML = '';
				contributionGrid.innerHTML = '';
				contributionGraphWrap.classList.add('hidden');
				contributionGraphEmpty.classList.remove('hidden');
				return;
			}

			const sortedDayKeys = Array.from(dayCounts.keys()).sort();
			const firstDate = parseDayKey(sortedDayKeys[0]);
			const lastDate = parseDayKey(sortedDayKeys[sortedDayKeys.length - 1]);
			if (!firstDate || !lastDate) {
				contributionSummary.textContent = '';
				contributionMonths.innerHTML = '';
				contributionGrid.innerHTML = '';
				contributionGraphWrap.classList.add('hidden');
				contributionGraphEmpty.classList.remove('hidden');
				return;
			}

			const firstWeekStart = startOfWeek(firstDate);
			const lastWeekStart = startOfWeek(lastDate);
			const totalDays = Math.round((lastWeekStart - firstWeekStart) / 86400000) + 7;
			const totalWeeks = Math.ceil(totalDays / 7);
			const maxCount = Math.max(...dayCounts.values());

			const totalContributions = Array.from(dayCounts.values()).reduce((sum, count) => sum + count, 0);
			contributionSummary.textContent = `${totalContributions} contribution${totalContributions === 1 ? '' : 's'} across ${dayCounts.size} day${dayCounts.size === 1 ? '' : 's'}`;

			const weekColumnTemplate = `repeat(${totalWeeks}, minmax(0, 0.75rem))`;
			contributionMonths.style.gridTemplateColumns = weekColumnTemplate;
			contributionGrid.style.gridTemplateColumns = weekColumnTemplate;

			const monthStartColumns = new Map();
			const monthTitles = new Map();
			for (let weekIndex = 0; weekIndex < totalWeeks; weekIndex += 1) {
				const daysPerMonth = new Map();
				for (let dayIndex = 0; dayIndex < 7; dayIndex += 1) {
					const day = new Date(firstWeekStart);
					day.setUTCDate(day.getUTCDate() + (weekIndex * 7) + dayIndex);
					const monthKey = `${day.getUTCFullYear()}-${String(day.getUTCMonth() + 1).padStart(2, '0')}`;
					daysPerMonth.set(monthKey, (daysPerMonth.get(monthKey) || 0) + 1);
					if (!monthTitles.has(monthKey)) {
						monthTitles.set(monthKey, day.toLocaleDateString(undefined, { month: 'short' }));
					}
				}

				for (const [monthKey, dayCount] of daysPerMonth.entries()) {
					if (dayCount >= 4 && !monthStartColumns.has(monthKey)) {
						monthStartColumns.set(monthKey, weekIndex + 1);
					}
				}
			}

			const monthLabels = Array.from(monthStartColumns.entries())
				.sort((a, b) => a[1] - b[1])
				.map(([monthKey, startColumn]) => {
					const monthTitle = monthTitles.get(monthKey) || '';
					return `<div class="text-left" style="grid-column: ${startColumn} / span 4;">${escapeHtmlUtil(monthTitle)}</div>`;
				});

			const cells = [];
				const weekTotals = [];
				for (let weekIndex = 0; weekIndex < totalWeeks; weekIndex += 1) {
					let weekTotal = 0;
					for (let dayIndex = 0; dayIndex < 7; dayIndex += 1) {
						const current = new Date(firstWeekStart);
						current.setUTCDate(current.getUTCDate() + (weekIndex * 7) + dayIndex);
						const dayKey = `${current.getUTCFullYear()}-${String(current.getUTCMonth() + 1).padStart(2, '0')}-${String(current.getUTCDate()).padStart(2, '0')}`;
						const count = dayCounts.get(dayKey) || 0;
						weekTotal += count;
					}
					weekTotals.push(weekTotal);
				}

				const maxWeekTotal = Math.max(...weekTotals);

				for (let weekIndex = 0; weekIndex < totalWeeks; weekIndex += 1) {
					for (let dayIndex = 0; dayIndex < 7; dayIndex += 1) {
						const current = new Date(firstWeekStart);
						current.setUTCDate(current.getUTCDate() + (weekIndex * 7) + dayIndex);
						const dayKey = `${current.getUTCFullYear()}-${String(current.getUTCMonth() + 1).padStart(2, '0')}-${String(current.getUTCDate()).padStart(2, '0')}`;
						const count = dayCounts.get(dayKey) || 0;
						cells.push(
							`<div class="h-4 w-4 rounded-sm border ${levelClass(count, maxCount)}" title="${count} contribution${count === 1 ? '' : 's'} on ${escapeHtmlUtil(formatDayLabel(dayKey))}"></div>`,
						);
					}
					const weekTotal = weekTotals[weekIndex];
					cells.push(
				`<div class="h-4 w-4 rounded-sm border flex items-center justify-center text-slate-900 text-[10px] font-semibold ${levelClass(weekTotal, maxWeekTotal)}" style="margin-top: 0.5rem; text-shadow: 0 0 1px rgba(255, 255, 255), 0 1px 2px rgba(255, 255, 255); opacity: 0.75;" title="${weekTotal} contribution${weekTotal === 1 ? '' : 's'} this week">${weekTotal}</div>`,
				);
			}

			contributionMonths.innerHTML = monthLabels.join('');
			contributionGrid.innerHTML = cells.join('');
			contributionGraphEmpty.classList.add('hidden');
			contributionGraphWrap.classList.remove('hidden');
		}

		function parseCurrentInput() {
			const text = dumpInput.value.trim();

			if (!text) {
				commits = [];
				renderRows([]);
				renderContributionGraph([]);
				return;
			}

			if (typeof parseGitDumpUtil !== 'function') {
				return;
			}

			const parsed = parseGitDumpUtil(text);
			commits = Array.isArray(parsed.commits) ? parsed.commits : [];
			renderRows(commits);
			renderContributionGraph(commits);
		}

		dumpFile.addEventListener('change', async () => {
			const file = dumpFile.files && dumpFile.files[0];
			if (!file) {
				return;
			}

			dumpInput.value = await file.text();
		});

		parseButton.addEventListener('click', parseCurrentInput);
		clearButton.addEventListener('click', () => {
			dumpFile.value = '';
			dumpInput.value = '';
			commits = [];
			renderRows([]);
			renderContributionGraph([]);
		});

		renderRows([]);
		renderContributionGraph([]);
	</script>
</body>
</html>
